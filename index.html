<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SFC FRIED CHICKEN</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#f6f6f6
}

header{
background:white;
padding:20px;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 12px rgba(0,0,0,.1)
}

nav{
display:flex;
justify-content:center;
align-items:center;
position:relative
}

.logo{
width:420px;
max-height:140px;
object-fit:contain
}

.phone{

position:absolute;
right:0;

background:#f4b000;
color:black;
padding:14px 25px;
border-radius:35px;
text-decoration:none;
font-weight:bold

}

.social{

position:absolute;
left:0;

display:flex;
gap:12px

}

.social a{

width:48px;
height:48px;

background:white;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:22px;

text-decoration:none;

box-shadow:0 4px 10px rgba(0,0,0,.15)

}

.social a:nth-child(1){

color:#E1306C

}

.social a:nth-child(2){

color:black

}

.social a:nth-child(3){

color:#1877F2

}

.hero{

height:60vh;

background:

linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.35)
),

url("signature.webp");

background-size:cover;
background-position:center;

display:flex;
align-items:center;

padding-left:6%;

color:white

}

.hero h1{

font-size:70px;
font-weight:900;
line-height:1

}

.hero p{

font-size:28px;
margin-top:15px;
color:#f4b000

}

.menu-title{

background:white;
padding:40px;
text-align:center

}

.menu-title h2{

font-size:40px

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:25px;

padding:30px 5%

}

.item{

background:white;

padding:15px;

border-radius:18px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.1)

}

.item img{

width:100%;
height:170px;

object-fit:contain

}

.item h3{

margin-top:10px

}

.price{

font-size:22px;
font-weight:bold;
color:red;
margin-top:10px

}

footer{

background:black;
color:white;
padding:30px;
text-align:center

}

.footer-social{

margin-top:15px;

display:flex;
justify-content:center;
gap:20px

}

.footer-social a{

color:white;
font-size:22px

}

@media(max-width:900px){

nav{
flex-direction:column;
gap:15px
}

.logo{
width:280px
}

.phone{
position:static
}

.social{
position:static
}

.hero{

justify-content:center;
text-align:center;
padding:20px

}

.hero h1{

font-size:35px

}

}

</style>

</head>

<body>

<header>

<nav>

<div class="social">

<a href="https://www.instagram.com/sfc.ma" target="_blank">

<i class="fa-brands fa-instagram"></i>

</a>

<a href="https://www.tiktok.com/@sfc.ma" target="_blank">

<i class="fa-brands fa-tiktok"></i>

</a>

<a href="https://www.facebook.com/sfcTiznit" target="_blank">

<i class="fa-brands fa-facebook-f"></i>

</a>

</div>

<img src="logo.png" class="logo">

<a class="phone"
href="tel:+212641928720">

☎ +212641928720

</a>

</nav>

</header>


<div class="hero">

<div>

<h1>
CRISPY • JUICY • IRRESISTIBLE
</h1>

<p>
Freshly made. Boldly seasoned.
</p>

</div>

</div>


<section class="menu-title">

<h2>
OUR MENU
</h2>

</section>


<div class="grid">

<div class="item">
<img src="classic-burger.webp">
<h3>Classic Burger</h3>
<div class="price">Price</div>
</div>

<div class="item">
<img src="crispy-wrap.webp">
<h3>Crispy Wrap</h3>
<div class="price">Price</div>
</div>

<div class="item">
<img src="double-smashed.webp">
<h3>Double Smashed</h3>
<div class="price">Price</div>
</div>

<div class="item">
<img src="cheese-bomb.webp">
<h3>Cheese Bomb</h3>
<div class="price">Price</div>
</div>

<div class="item">
<img src="sfc-duo.webp">
<h3>SFC Duo</h3>
<div class="price">Price</div>
</div>

<div class="item">
<img src="wrap-duo.webp">

<div class="price">Price</div>
</div>

</div>

<footer>

<div class="footer-social">

<i class="fa-brands fa-instagram"></i>

</a>

<i class="fa-brands fa-tiktok"></i>

</a>

<a href="https://www.facebook.com/sfcTiznit">

<i class="fa-brands fa-facebook"></i>

</a>

</div>

</footer>

</body>
</html>
