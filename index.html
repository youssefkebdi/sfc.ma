<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SFC FRIED CHICKEN</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#f5f5f5
}

header{
background:#000;
padding:15px;
position:sticky;
top:0;
z-index:100
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap
}

.logo{
width:220px
}

.phone{
background:#f4b000;
padding:10px 18px;
border-radius:30px;
font-weight:bold;
text-decoration:none;
color:black
}

.hero{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("signature.webp");
background-size:cover;
background-position:center;
color:white;
}

.hero h1{
font-size:55px;
margin-bottom:15px
}

.hero p{
font-size:22px
}

.menu-title{
text-align:center;
padding:40px
}

.main{
display:grid;
grid-template-columns:1fr 320px;
gap:20px;
padding:20px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px
}

.item{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
cursor:pointer
}

.item img{
width:100%;
height:180px;
object-fit:cover
}

.content{
padding:15px
}

.price{
color:red;
font-size:20px;
font-weight:bold
}

.cart{
background:white;
padding:20px;
border-radius:20px;
position:sticky;
top:100px;
height:fit-content
}

.cart h2{
margin-bottom:20px
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #ddd
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer
}

.whatsapp{
background:#16b84e;
color:white
}

.clear{
background:black;
color:white
}

@media(max-width:900px){

.main{
grid-template-columns:1fr
}

.hero h1{
font-size:35px
}

}
</style>

</head>

<body>

<header>
<nav>

<img src="logo.png" class="logo">

<a class="phone"
href="tel:+212641928720">
☎ +212641928720
</a>

</nav>
</header>

<div class="hero">
<div>
<h1>SFC FRIED CHICKEN</h1>
<p>Crispy • Juicy • Irresistible</p>
</div>
</div>

<section class="menu-title">
<h2>OUR MENU</h2>
<p>Tap item to add basket</p>
</section>

<div class="main">

<div class="grid" id="menuGrid"></div>

<div class="cart">

<h2>Your Basket</h2>

<div id="basket">

No items selected

</div>

<h3 style="margin-top:20px">

Total:
<span id="total">

0 DH

</span>

</h3>

<button class="whatsapp"
onclick="checkout()">

ORDER ON WHATSAPP

</button>

<button class="clear"
onclick="clearCart()">

CLEAR

</button>

</div>

</div>

<script>

const phone="212641928720";

const menu=[

{name:"Cheese Bomb",price:50,img:"cheese-bomb.webp"},
{name:"Classic Burger",price:35,img:"classic-burger.webp"},
{name:"Crisp Duo",price:55,img:"crisp-duo.webp"},
{name:"Crispy Loaded",price:60,img:"crispy-loaded.webp"},
{name:"Crispy Wrap",price:40,img:"crispy-wrap.webp"},
{name:"Double Smashed",price:65,img:"double-smashed.webp"},
{name:"Happy Duo",price:80,img:"happy-duo.webp"},
{name:"Italian Bowl",price:55,img:"italian-bowl.webp"},
{name:"Italian Crispy",price:55,img:"italian-crispy.webp"},
{name:"Mac Cheese Bowl",price:45,img:"mac-cheese-bowl.webp"},
{name:"Mac Cheese Crispy",price:48,img:"mac-cheese-crispy.webp"},
{name:"Meat Loaded",price:70,img:"meat-loaded.webp"},
{name:"Sauce Bomb",price:50,img:"sauce-bomb.webp"},
{name:"SFC Duo",price:75,img:"sfc-duo.webp"},
{name:"Signature",price:60,img:"signature.webp"},
{name:"Smashed Wrap",price:45,img:"smashed-wrap.webp"},
{name:"The Classic",price:45,img:"the-classic.webp"},
{name:"The Crispy Tacos",price:40,img:"the-crispy-tacos.webp"},
{name:"The Meat Tacos",price:45,img:"the-meat-tacos.webp"},
{name:"The Mixt",price:60,img:"the-mixt.webp"},
{name:"The Special",price:65,img:"the-special.webp"},
{name:"The Spicy",price:55,img:"the-spicy.webp"},
{name:"Triple Smashed",price:85,img:"triple-smashed.webp"},
{name:"Wrap Duo",price:70,img:"wrap-duo.webp"},
{name:"Extra Cola",price:12,img:"extra-cola.webp"},
{name:"Extra Fries",price:15,img:"extra-fries.webp"},
{name:"Extra Sauce",price:8,img:"extra-sauce.webp"}

];

let cart=[];

function loadMenu(){

document.getElementById("menuGrid").innerHTML=
menu.map((item,i)=>`

<div class="item"
onclick="addItem(${i})">

<img src="${item.img}">

<div class="content">

<h3>${item.name}</h3>

<div class="price">

${item.price} DH

</div>

</div>

</div>

`).join("");

}

function addItem(i){

cart.push(menu[i]);

renderCart();

}

function renderCart(){

let basket=document.getElementById("basket");

if(cart.length==0){

basket.innerHTML="No items selected";

document.getElementById("total").innerHTML="0 DH";

return;

}

basket.innerHTML=
cart.map((x)=>

`<div class="row">
<span>${x.name}</span>
<span>${x.price} DH</span>
</div>`

).join("");

let total=
cart.reduce((a,b)=>a+b.price,0);

document.getElementById("total")
.innerHTML=total+" DH";

}

function clearCart(){

cart=[];

renderCart();

}

function checkout(){

let total=
cart.reduce((a,b)=>a+b.price,0);

let text="Hello SFC FRIED CHICKEN%0A%0A";

cart.forEach(x=>{

text+=
`${x.name}
${x.price} DH%0A`;

});

text+=`%0ATotal:
${total} DH`;

window.open(
`https://wa.me/${phone}?text=${text}`
);

}

loadMenu();

</script>

</body>
</html>
