<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFC Fried Chicken Menu</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>

<header class="site-header">
  <div class="socials">
    <a href="https://www.instagram.com/sfc.ma" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://www.tiktok.com/@sfc.ma" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    <a href="https://www.facebook.com/sfcTiznit" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
  </div>

  <a class="brand" href="#menu">
    <img src="logo.png" alt="SFC Fried Chicken" onerror="this.style.display='none'">
    <span>SFC Fried Chicken</span>
  </a>

  <a class="call" href="tel:+212641928720">
    <i class="fa-solid fa-phone"></i> +212 641 928 720
  </a>
</header>

<section class="intro">
  <h1>SFC Menu</h1>
  <p>Tap any item to send your order directly on WhatsApp.</p>
</section>

<main id="menu" class="menu-pages"></main>

<footer>
  <div class="footer-logo">SFC Fried Chicken</div>
  <div class="footer-socials">
    <a href="https://www.instagram.com/sfc.ma" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://www.tiktok.com/@sfc.ma" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
    <a href="https://www.facebook.com/sfcTiznit" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
  </div>
  <a class="footer-link" href="https://maps.app.goo.gl/zPzpB3QQHrpQdzuC8" target="_blank">
    <i class="fa-solid fa-location-dot"></i> Open location
  </a>
  <a class="footer-link" href="tel:+212641928720">
    <i class="fa-solid fa-phone"></i> +212 641 928 720
  </a>
</footer>

<div id="toast" class="toast">Opening WhatsApp...</div>

<script src="script.js"></script>
</body>
</html>
