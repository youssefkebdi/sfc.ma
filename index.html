<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFC FRIED CHICKEN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#f5f5f5;
}

header{
background:black;
padding:20px 5%;
color:white;
overflow:hidden;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.logo-box{
background:linear-gradient(135deg,#fff9d7,#ffbe2e);
padding:12px 25px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,200,0,.4);
}

.logo-box img{
width:260px;
display:block;
}

.links a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.call{
background:red;
padding:15px 25px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
gap:40px;
}

.hero h1{
font-size:75px;
line-height:.9;
font-weight:900;
}

.hero h1 span{
color:red;
}

.hero p{
font-size:22px;
margin:20px 0;
}

.hero-buttons a{
display:inline-block;
padding:15px 30px;
border-radius:50px;
margin-right:15px;
text-decoration:none;
font-weight:bold;
}

.red{
background:red;
color:white;
}

.white{
border:2px solid white;
color:white;
}

.hero img{
width:100%;
border-radius:20px;
}

.menu-title{
text-align:center;
padding:30px;
}

.menu-title h2{
font-size:45px;
color:#d00000;
}

.main{
display:grid;
grid-template-columns:1fr 350px;
gap:25px;
padding:0 4%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:130px;
object-fit:contain;
}

.card h3{
font-size:16px;
margin-top:10px;
}

.price{
color:red;
font-size:20px;
font-weight:bold;
}

.plus{
float:right;
background:red;
color:white;
width:30px;
height:30px;
border-radius:50%;
line-height:30px;
text-align:center;
font-size:22px;
}

.cart{
background:white;
border-radius:20px;
overflow:hidden;
position:sticky;
top:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.cart h2{
background:red;
color:white;
padding:20px;
}

.cart-content{
padding:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.total{
display:flex;
justify-content:space-between;
font-size:25px;
font-weight:bold;
margin:20px 0;
}

button{
width:100%;
padding:15px;
border:0;
border-radius:10px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.whatsapp{
background:#16b84e;
color:white;
}

.clear{
border:1px solid red;
color:red;
background:white;
}

footer{
margin-top:40px;
padding:30px;
background:black;
color:white;
text-align:center;
}

@media(max-width:900px){

.hero,.main{
grid-template-columns:1fr;
}

.hero h1{
font-size:50px;
}

nav{
flex-direction:column;
gap:20px;
}

}

</style>
</head>

<body>

<header>

<nav>

<div class="logo-box">
<img src="logo.png">
</div>

<div class="links">
<a href="#">MENU</a>
<a href="https://maps.app.goo.gl/zPzpB3QQHrpQdzuC8">LOCATION</a>
<a href="tel:+212641928720">CONTACT</a>
</div>

<a class="call" href="tel:+212641928720">
☎ +212641928720
</a>

</nav>

<div class="hero">

<div>

<h1>

CRISPY.<br>

<span>JUICY.</span><br>

IRRESISTIBLE.

</h1>

<p>

Freshly made. Boldly seasoned. Always SFC.

</p>

<div class="hero-buttons">

<a class="red" href="tel:+212641928720">

CALL NOW

</a>

<a class="white"
href="https://maps.app.goo.gl/zPzpB3QQHrpQdzuC8">

VIEW LOCATION

</a>

</div>

</div>

<img src="signature.webp">

</div>

</header>

<section class="menu-title">

<h2>OUR MENU</h2>

<p>Tap any item to add basket</p>

</section>

<div class="main">

<div class="grid" id="menu"></div>

<div class="cart">

<h2>YOUR BASKET</h2>

<div class="cart-content">

<div id="basket">

No items selected

</div>

<div class="total">

<span>TOTAL</span>

<span id="total">

0 DH

</span>

</div>

<button class="whatsapp"
onclick="checkout()">

CHECKOUT ON WHATSAPP

</button>

<button class="clear"
onclick="clearBasket()">

CLEAR BASKET

</button>

</div>

</div>

</div>

<footer>

© SFC FRIED CHICKEN

</footer>

<script>

const items=[

["THE CLASSIC",25,"classic-burger.webp"],
["SIGNATURE",33,"signature.webp"],
["THE SPECIAL",33,"special.webp"],
["THE SPICY",26,"spicy.webp"],
["3 STRIPS",30,"3-strips.webp"],
["6 STRIPS",49,"6-strips.webp"],
["10 STRIPS",69,"10-strips.webp"],
["DOUBLE SMASHED",30,"double-smashed.webp"],
["CRISPY WRAP",22,"crispy-wrap.webp"],
["CHEESE BOMB",22,"cheese-bomb.webp"],
["CRISP DUO",39,"crisp-duo.webp"],
["CRISPY LOADED",25,"crispy-loaded.webp"],
["EXTRA COLA",5,"extra-cola.webp"],
["EXTRA FRIES",5,"extra-fries.webp"],
["EXTRA SAUCE",2,"extra-sauce.webp"]

];

let basket=[];

const menu=document.getElementById("menu");

items.forEach((item,index)=>{

menu.innerHTML +=`

<div class="card"

onclick="add(${index})">

<span class="plus">+</span>

<img src="${item[2]}">

<h3>${item[0]}</h3>

<div class="price">

${item[1]} DH

</div>

</div>

`;

});

function add(i){

basket.push(items[i]);

update();

}

function update(){

let html="";

let total=0;

basket.forEach(item=>{

html+=`

<div class="row">

<span>${item[0]}</span>

<span>${item[1]} DH</span>

</div>

`;

total+=item[1];

});

document.getElementById("basket").innerHTML=html || "No items selected";

document.getElementById("total").innerText=total+" DH";

}

function clearBasket(){

basket=[];

update();

}

function checkout(){

let total=0;

let msg="Hello SFC FRIED CHICKEN,%0A%0AI want:%0A";

basket.forEach(item=>{

msg += item[0]+" - "+item[1]+" DH%0A";

total += item[1];

});

msg += "%0ATotal: "+total+" DH";

window.open(

"https://wa.me/212641928720?text="+msg

);

}

</script>

</body>
</html>
